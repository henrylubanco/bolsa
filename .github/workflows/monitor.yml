name: Monitor de Ativos B3

on:
  schedule:
    # Unificado: Roda a cada 10 min entre 08:00 e 18:00 (Brasília)
    # 11:00 às 21:00 UTC. Isso cobre o check-in das 8h, o resumo das 11h e o monitoramento.
    - cron: '*/10 11-21 * * 1-5'
    
  workflow_dispatch: # Botão manual

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4 # Atualizado de v3 para v4 (Node 24)

      - name: Configurar Python
        uses: actions/setup-python@v5 # Atualizado de v4 para v5 (Node 24)
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pytz

      - name: Executar Script de Monitoramento
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py
